<html lang="en">
    <head>
        <title>Toboloc - Log In</title>

        <meta charset="utf-8">
        <link rel= "stylesheet" href="../styles/main_style.css">
        <link rel= "stylesheet" href="../styles/navigation_bar_style.css">
        <link rel= "stylesheet" href="../styles/content_style.css">
        <link rel= "stylesheet" href="../styles/login_style.css">
        <script src="../scripts/login_script.js"></script>
        <script src="../scripts/main_script.js"></script>
    </head>
    <body>
        <header>
            <div id="title_line">
                <h1 id="title" >Toboloc</h1>
            </div>
            <div id="nav_bar">
                <ul id="menu">
                    <li>
                        <a href="home.html">Home</a>
                    </li>
                    <li>
                        <p>Products</p>
                        <ul>
                            <li>
                                <a href="slides.html">Slides</a>
                            </li>
                            <li>
                                <a href="water_slides.html">Water slides</a>
                            </li>
                        </ul>
                    </li>
                    <li>
                        <a href="buy.html">Buy</a>
                    </li>
                    <li>
                        <a href="about.html">About us</a>
                    </li>
                </ul>
            </div>
        </header>
        <section>
            <div id="content">
                <h2>Log In</h2>
                <form id="login_form" onsubmit="login(); return false">
                    <table>
                        <tr>
                            <td>
                                <label for="mail">E-mail address:</label>
                            </td>
                            <td>
                                <input type="email" name="mail" id="mail" placeholder="email@email.com" required>
                            </td>
                        </tr>
                        <tr>
                            <td>
                                <label for="password">Password:</label>
                            </td>
                            <td>
                                <input type="password" name="password" id="password" placeholder="********" pattern=".{8,}" title="Eight or more characters" required>
                            </td>
                        </tr>
                    </table>
                    <input type="checkbox" name="stay_connected" id="stay_connected">
                    <label for="stay_connected">Stay Connected</label>
                    <br>
                    <p id="create_account">
                        Don't have an account ? 
                        <a href="create_account.html">Create one now</a>
                    </p>
                    <button type="submit">Connect</button>
                    <button type="button" onclick="history.back()">Cancel</button>
                </form>
            </div>
        </section>
        <footer>
            <ul>
                <li>
                    <a href="contact.html">Contact us</a>
                </li>
                <li>
                    <a href="https://goo.gl/maps/vMVJikAC5TB77T2r6" target="_blank">Find us</a>
